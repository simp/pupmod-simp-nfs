---
HOSTS:
  alma9-server:
    roles:
    - default
    - master
    - server
    - nfs_server
    - nfs_server_and_client
    - el9
    platform: el-9-x86_64
    box: almalinux/9
    hypervisor: "<%= ENV.fetch('BEAKER_HYPERVISOR', 'vagrant') %>"
    vagrant_memsize: 2048
    vagrant_cpus: 2
    family: almalinux-cloud/almalinux-9
    gce_machine_type: n1-standard-2
  alma9-server2:
    roles:
    - nfs_server
    - nfs_server_and_client
    - el9
    platform: el-9-x86_64
    box: almalinux/9
    hypervisor: "<%= ENV.fetch('BEAKER_HYPERVISOR', 'vagrant') %>"
    vagrant_memsize: 2048
    vagrant_cpus: 2
    family: almalinux-cloud/almalinux-9
    gce_machine_type: n1-standard-2
  alma9-client:
    roles:
    - nfs_client
    - el9
    platform: el-9-x86_64
    box: almalinux/9
    hypervisor: "<%= ENV.fetch('BEAKER_HYPERVISOR', 'vagrant') %>"
    vagrant_memsize: 2048
    vagrant_cpus: 2
    family: almalinux-cloud/almalinux-9
    gce_machine_type: n1-standard-2
CONFIG:
  log_level: verbose
  type: aio
  ssh:
    keepalive: true
    keepalive_interval: 10
    keepalive_maxcount: 60
  puppet_collection: "<%= ENV.fetch('BEAKER_PUPPET_COLLECTION', 'openvox8') %>"
